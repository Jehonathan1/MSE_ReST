<!-- src/public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSE Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">MSE Monitor</h1>
        
        <!-- Connection Status -->
        <div class="mb-6 p-4 rounded-lg bg-white shadow">
            <h2 class="text-xl font-semibold mb-2">Connection Status</h2>
            <div id="connectionStatus" class="text-red-500">Disconnected</div>
        </div>

        <!-- Current Status -->
        <div class="mb-6 p-4 rounded-lg bg-white shadow">
            <h2 class="text-xl font-semibold mb-2">Current Status</h2>
            <div class="grid grid-cols-2 gap-4">
                <!-- Current Profile -->
                <div>
                    <h3 class="font-medium text-gray-700">Profile:</h3>
                    <div id="currentProfile" class="mt-1 text-lg">No profile loaded</div>
                </div>
                <!-- Current Show -->
                <div>
                    <h3 class="font-medium text-gray-700">Show:</h3>
                    <div id="currentShow" class="mt-1 text-lg">No show loaded</div>
                </div>
            </div>
        </div>

        <!-- Recent Actions -->
        <div class="p-4 rounded-lg bg-white shadow">
            <h2 class="text-xl font-semibold mb-2">Recent Actions</h2>
            <div id="recentActions" class="space-y-2">
                <!-- Actions will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.hostname}:${window.location.port}/`);
        const connectionStatus = document.getElementById('connectionStatus');
        const currentProfile = document.getElementById('currentProfile');
        const currentShow = document.getElementById('currentShow');
        const recentActions = document.getElementById('recentActions');

        ws.onopen = () => {
            connectionStatus.textContent = 'Connected';
            connectionStatus.className = 'text-green-500';
        };

        ws.onclose = () => {
            connectionStatus.textContent = 'Disconnected';
            connectionStatus.className = 'text-red-500';
            setTimeout(() => window.location.reload(), 5000);
        };

        ws.onmessage = (event) => {
            console.log('📥 Raw message received:', event.data);
            try {
                const data = JSON.parse(event.data);
                console.log('📦 Parsed message:', data);

                switch (data.type) {
                    case 'currentShow':
                        updateShow(data.data);
                        break;
                    case 'currentProfile':
                        updateProfile(data.data);
                        break;
                    case 'action':
                        addAction(data.data);
                        break;
                    case 'templateContent':
                        updateTemplateContent(data.data);
                        break;
                }
            } catch (error) {
                console.error('❌ Error processing message:', error);
            }
        };

        function updateShow(show) {
        if (show && show.name) {
            currentShow.textContent = show.name;
            currentShow.className = 'mt-1 text-lg text-green-600 font-medium';
        }
    }
    function updateProfile(profile) {
        if (profile && profile.name) {
            currentProfile.textContent = profile.name;
            currentProfile.className = 'mt-1 text-lg text-blue-600 font-medium';
        }
    }

        function addAction(action) {
            const actionElement = document.createElement('div');
            actionElement.className = 'p-3 bg-gray-50 rounded border-l-4 border-blue-500 mb-2';
            
            // Color code different actions
            const actionColors = {
                'take': 'border-green-500',
                'continue': 'border-blue-500',
                'out': 'border-red-500',
                'cleanup': 'border-yellow-500',
                'initialize': 'border-purple-500'
            };
            
            actionElement.className = `p-3 bg-gray-50 rounded border-l-4 mb-2 ${actionColors[action.type] || 'border-gray-500'}`;
            
            actionElement.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-1 rounded text-sm ${getActionBadgeColor(action.type)}">
                                ${action.type.toUpperCase()}
                            </span>
                            <p class="font-medium">${action.template}</p>
                        </div>
                        <p class="text-sm text-gray-600 mt-1">Loading content...</p>
                        <div class="text-xs text-gray-500 mt-1">
                            ${new Date(action.timestamp).toLocaleTimeString()}
                        </div>
                    </div>
                </div>
            `;
            
            // Store action timestamp as ID for updating content later
            actionElement.id = `action-${action.timestamp}`;

            recentActions.insertBefore(actionElement, recentActions.firstChild);

            // Keep only last 10 actions
            while (recentActions.children.length > 10) {
                recentActions.removeChild(recentActions.lastChild);
            }
        }

        function updateTemplateContent(content) {
            const actionElement = recentActions.firstElementChild;
            if (actionElement) {
                const contentP = actionElement.querySelector('.text-gray-600');
                if (contentP && content.fields) {
                    // Format each field with its name and value
                    const fieldsHtml = content.fields.map(field => `
                        <div class="mb-1">
                            <span class="font-medium">${field.field}:</span> 
                            <span class="text-gray-700">${field.value}</span>
                        </div>
                    `).join('');
                    
                    contentP.innerHTML = `
                        <div class="mt-2">
                            <div class="font-medium text-gray-700">Template: ${content.template}</div>
                            ${fieldsHtml}
                        </div>
                    `;
                }
            }
        }

        function getActionBadgeColor(action) {
            const colors = {
                'take': 'bg-green-100 text-green-800',
                'continue': 'bg-blue-100 text-blue-800',
                'out': 'bg-red-100 text-red-800',
                'cleanup': 'bg-yellow-100 text-yellow-800',
                'initialize': 'bg-purple-100 text-purple-800'
            };
            return colors[action] || 'bg-gray-100 text-gray-800';
        }
    </script>
</body>
</html>
