<!-- src/public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSE Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">MSE Monitor</h1>
        
        <!-- Connection Status -->
        <div class="mb-6 p-4 rounded-lg bg-white shadow">
            <h2 class="text-xl font-semibold mb-2">Connection Status</h2>
            <div id="connectionStatus" class="text-red-500">Disconnected</div>
        </div>

        <!-- Current Status -->
        <div class="mb-6 p-4 rounded-lg bg-white shadow">
            <h2 class="text-xl font-semibold mb-2">Current Status</h2>
            <div class="grid grid-cols-2 gap-4">
                <!-- Current Profile -->
                <div>
                    <h3 class="font-medium text-gray-700">Profile:</h3>
                    <div id="currentProfile" class="mt-1 text-lg">No profile loaded</div>
                </div>
                <!-- Current Show -->
                <div>
                    <h3 class="font-medium text-gray-700">Show:</h3>
                    <div id="currentShow" class="mt-1 text-lg">No show loaded</div>
                </div>
            </div>
        </div>

        <!-- Recent Actions -->
        <div class="p-4 rounded-lg bg-white shadow">
            <h2 class="text-xl font-semibold mb-2">Recent Actions</h2>
            <div id="recentActions" class="space-y-2">
                <!-- Actions will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.hostname}:${window.location.port}/`);
        const connectionStatus = document.getElementById('connectionStatus');
        const currentProfile = document.getElementById('currentProfile');
        const currentShow = document.getElementById('currentShow');
        const recentActions = document.getElementById('recentActions');

        ws.onopen = () => {
            connectionStatus.textContent = 'Connected';
            connectionStatus.className = 'text-green-500';
        };

        ws.onclose = () => {
            connectionStatus.textContent = 'Disconnected';
            connectionStatus.className = 'text-red-500';
            setTimeout(() => window.location.reload(), 5000);
        };

        ws.onmessage = (event) => {
            console.log('📥 Raw message received:', event.data);
            try {
                const data = JSON.parse(event.data);
                console.log('📦 Parsed message:', data);

                switch (data.type) {
                    case 'currentShow':
                        updateShow(data.data);
                        break;
                    case 'currentProfile':
                        updateProfile(data.data);
                        break;
                    case 'action':
                        addAction(data.data);
                        break;
                    case 'templateContent':
                        updateTemplateContent(data.data);
                        break;
                }
            } catch (error) {
                console.error('❌ Error processing message:', error);
            }
        };

        function updateShow(show) {
            currentShow.textContent = show.name;
        }

        function updateProfile(profile) {
            currentProfile.textContent = profile.name;
        }

        function addAction(action) {
            const actionElement = document.createElement('div');
            actionElement.className = 'p-3 bg-gray-50 rounded border-l-4 border-blue-500';
            actionElement.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-medium">${action.template}</p>
                        <p class="text-gray-600">Action: ${action.type}</p>
                        <p class="text-sm text-gray-500">Loading content...</p>
                    </div>
                    <span class="text-sm text-gray-500">
                        ${new Date().toLocaleTimeString()}
                    </span>
                </div>
            `;
            actionElement.id = `action-${action.timestamp}`;

            recentActions.insertBefore(actionElement, recentActions.firstChild);

            // Keep only last 10 actions
            while (recentActions.children.length > 10) {
                recentActions.removeChild(recentActions.lastChild);
            }
        }

        function updateTemplateContent(content) {
            // Find the most recent action and update its content
            const actionElement = recentActions.firstElementChild;
            if (actionElement) {
                const contentP = actionElement.querySelector('.text-gray-600');
                contentP.textContent = content.content.join(' | ');
            }
        }
    </script>
</body>
</html>
