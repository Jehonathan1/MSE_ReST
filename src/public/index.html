<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSE Data Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid py-4">
        <h1 class="mb-4">MSE Data Viewer (localhost:8580)</h1>
        
        <!-- Playout Controls -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Playout Controls</h3>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Select Show</label>
                        <select class="form-select" id="showSelect">
                            <option value="">Choose a show...</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Select Playlist</label>
                        <select class="form-select" id="playlistSelect" disabled>
                            <option value="">Choose a playlist...</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Select Page</label>
                        <select class="form-select" id="pageSelect" disabled>
                            <option value="">Choose a page...</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <div class="d-flex flex-column h-100 justify-content-end">
                            <div class="btn-group">
                                <button class="btn btn-primary" id="takeButton" disabled>Take</button>
                                <button class="btn btn-secondary" id="continueButton" disabled>Continue</button>
                                <button class="btn btn-danger" id="outButton" disabled>Out</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12 d-flex justify-content-end">
                        <button class="btn btn-outline-danger" id="cleanupButton" disabled>
                            Cleanup and Reactivate Page List
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Shows Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="showsTable">
                <thead class="table-light">
                    <tr>
                        <th>Name of Show</th>
                        <th>Path</th>
                        <th>Link</th>
                        <th>Pages</th>
                        <th>Templates</th>
                        <th>Playlists</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div class="toast align-items-center text-white bg-success border-0" role="alert" id="successToast">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div class="toast align-items-center text-white bg-danger border-0" role="alert" id="errorToast">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
